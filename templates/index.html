<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mehrzad Scanner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #e94560;
            font-size: 28px;
        }
        
        .scanner-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .section-title {
            font-size: 20px;
            margin-bottom: 15px;
            color: #fff;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }
        
        .btn-futures {
            background: linear-gradient(135deg, #e94560, #c73e54);
            color: white;
        }
        
        .btn-spot {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
        }
        
        .btn-download {
            background: linear-gradient(135deg, #0f3460, #1a4f8a);
            color: white;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        
        .btn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }
        
        .progress-container {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            display: none;
        }
        
        .progress-bar {
            width: 100%;
            height: 30px;
            background: #333;
            border-radius: 15px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #f39c12, #2ecc71);
            transition: width 0.5s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }
        
        .status {
            text-align: center;
            margin: 10px 0;
            font-size: 16px;
            color: #aaa;
        }
        
        .divider {
            text-align: center;
            font-size: 24px;
            margin: 20px 0;
            color: #555;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Mehrzad Scanner</h1>
        
        <!-- Futures Section -->
        <div class="scanner-section">
            <div class="section-title">📈 XT Futures Scanner</div>
            
            <button class="btn btn-futures" id="btnFutures" onclick="startFutures()">
                🔍 شروع اسکن Futures
            </button>
            
            <div class="progress-container" id="progressFuturesContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFutures">0%</div>
                </div>
                <div class="status" id="statusFutures">آماده</div>
            </div>
            
            <button class="btn btn-download hidden" id="btnDownloadFutures" onclick="downloadFutures()">
                📥 دانلود PDF Futures
            </button>
        </div>
        
        <div class="divider">─────────────────</div>
        
        <!-- Spot Section -->
        <div class="scanner-section">
            <div class="section-title">💰 XT Spot Scanner</div>
            
            <button class="btn btn-spot" id="btnSpot" onclick="startSpot()">
                🔍 شروع اسکن Spot
            </button>
            
            <div class="progress-container" id="progressSpotContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressSpot">0%</div>
                </div>
                <div class="status" id="statusSpot">آماده</div>
            </div>
            
            <button class="btn btn-download hidden" id="btnDownloadSpot" onclick="downloadSpot()">
                📥 دانلود PDF Spot
            </button>
        </div>
    </div>

    <script>
        // ⚠️ آدرس سرور خودت رو اینجا بذار!
        const SERVER_URL = 'https://mehrzad-scanner.onrender.com';
        
        let futuresInterval, spotInterval;
        
        // Futures Functions
        function startFutures() {
            document.getElementById('btnFutures').disabled = true;
            document.getElementById('progressFuturesContainer').style.display = 'block';
            document.getElementById('statusFutures').textContent = '⏳ در حال اتصال...';
            document.getElementById('btnDownloadFutures').classList.add('hidden');
            
            fetch(`${SERVER_URL}/start_futures`)
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'started' || data.status === 'already_running') {
                        checkFuturesStatus();
                    }
                })
                .catch(err => {
                    console.error('Error:', err);
                    document.getElementById('statusFutures').textContent = '❌ خطا در اتصال';
                    document.getElementById('btnFutures').disabled = false;
                });
        }
        
        function checkFuturesStatus() {
            futuresInterval = setInterval(() => {
                fetch(`${SERVER_URL}/futures_status`)
                    .then(res => res.json())
                    .then(data => {
                        const progress = data.progress || 0;
                        document.getElementById('progressFutures').style.width = progress + '%';
                        document.getElementById('progressFutures').textContent = progress + '%';
                        
                        if (data.error) {
                            document.getElementById('statusFutures').textContent = '❌ خطا: ' + data.error;
                            clearInterval(futuresInterval);
                            document.getElementById('btnFutures').disabled = false;
                        }
                        
                        if (progress === 100 && !data.running) {
                            clearInterval(futuresInterval);
                            document.getElementById('statusFutures').textContent = '✅ اسکن کامل شد!';
                            document.getElementById('btnFutures').disabled = false;
                            document.getElementById('btnDownloadFutures').classList.remove('hidden');
                        }
                    })
                    .catch(err => {
                        console.error('Error:', err);
                    });
            }, 2000);
        }
        
        function downloadFutures() {
            window.location.href = `${SERVER_URL}/download_futures_pdf`;
        }
        
        // Spot Functions
        function startSpot() {
            document.getElementById('btnSpot').disabled = true;
            document.getElementById('progressSpotContainer').style.display = 'block';
            document.getElementById('statusSpot').textContent = '⏳ در حال اتصال...';
            document.getElementById('btnDownloadSpot').classList.add('hidden');
            
            fetch(`${SERVER_URL}/start_spot`)
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'started' || data.status === 'already_running') {
                        checkSpotStatus();
                    }
                })
                .catch(err => {
                    console.error('Error:', err);
                    document.getElementById('statusSpot').textContent = '❌ خطا در اتصال';
                    document.getElementById('btnSpot').disabled = false;
                });
        }
        
        function checkSpotStatus() {
            spotInterval = setInterval(() => {
                fetch(`${SERVER_URL}/spot_status`)
                    .then(res => res.json())
                    .then(data => {
                        const progress = data.progress || 0;
                        document.getElementById('progressSpot').style.width = progress + '%';
                        document.getElementById('progressSpot').textContent = progress + '%';
                        
                        if (data.error) {
                            document.getElementById('statusSpot').textContent = '❌ خطا: ' + data.error;
                            clearInterval(spotInterval);
                            document.getElementById('btnSpot').disabled = false;
                        }
                        
                        if (progress === 100 && !data.running) {
                            clearInterval(spotInterval);
                            document.getElementById('statusSpot').textContent = '✅ اسکن کامل شد!';
                            document.getElementById('btnSpot').disabled = false;
                            document.getElementById('btnDownloadSpot').classList.remove('hidden');
                        }
                    })
                    .catch(err => {
                        console.error('Error:', err);
                    });
            }, 2000);
        }
        
        function downloadSpot() {
            window.location.href = `${SERVER_URL}/download_spot_pdf`;
        }
    </script>
</body>
</html>
